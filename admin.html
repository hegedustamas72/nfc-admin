<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFC Link Generátor</title>
  <style>
    body { font-family: Arial, sans-serif; text-align:center; padding:40px; background:#f0f0f0; }
    .card { background:#fff; padding:35px; border-radius:15px; max-width:480px; margin:auto; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
    input { width: 80%; padding:10px; margin:10px 0; font-size:16px; border-radius:8px; border:1px solid #ccc; }
    button { padding:15px 25px; font-size:18px; border:none; border-radius:10px; background:#42a5f5; color:white; cursor:pointer; margin-top:15px; }
    button:active { transform:scale(0.97); }
    #link { margin-top:20px; word-break: break-all; font-weight:bold; color:#d32f2f; }
  </style>
</head>
<body>
  <div class="card">
    <h1>NFC Link Generátor</h1>

    <input type="text" id="childName" placeholder="Gyermek / Háziállat neve">
    <input type="text" id="g1Label" placeholder="Gondviselő1 titulus (Apa, Anya, Gazdi1)">
    <input type="tel" id="g1Phone" placeholder="Gondviselő1 telefon">
    <input type="text" id="g2Label" placeholder="Gondviselő2 titulus (opcionális)">
    <input type="tel" id="g2Phone" placeholder="Gondviselő2 telefon (opcionális)">

    <button id="generateBtn">Link generálása</button>

    <div id="link">Itt jelenik meg a generált link</div>
  </div>

  <script type="module">
    const btn = document.getElementById("generateBtn");
    const linkDiv = document.getElementById("link");

    btn.onclick = async () => {
      const name = document.getElementById("childName").value.trim();
      const g1_label = document.getElementById("g1Label").value.trim();
      const g1_phone = document.getElementById("g1Phone").value.trim();
      const g2_label = document.getElementById("g2Label").value.trim();
      const g2_phone = document.getElementById("g2Phone").value.trim();

      if(!name || !g1_label || !g1_phone) {
        linkDiv.textContent = "Kérlek töltsd ki legalább a gyermek nevét és gondviselő1 adatait!";
        return;
      }

      try {
        const res = await fetch("https://eogrnzuarpqlyjclkcqq.supabase.co/functions/v1/create-tag", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ3JuenVhcnBxbHlqY2xrY3FxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzkzNDI5NiwiZXhwIjoyMDg5NTEwMjk2fQ.uDwhnsdyti-r7zMaLm0HCzNFEvRnrSW5KPYQoigFoso"  // ide a Service Role Key
          },
          body: JSON.stringify({
            name,
            g1_label,
            g1_phone,
            g2_label: g2_label || null,
            g2_phone: g2_phone || null
          })
        });

        if(!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        linkDiv.textContent = data.url;

      } catch(err) {
        console.error(err);
        linkDiv.textContent = "Hiba a link generálás közben: " + err.message;
      }
    };
  </script>
</body>
</html>
