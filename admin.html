<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFC Admin</title>

  <style>
    body { font-family: Arial; text-align:center; padding:40px; background:#f0f0f0; }
    .card { background:#fff; padding:35px; border-radius:15px; max-width:480px; margin:auto; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
    input { width: 80%; padding:10px; margin:10px 0; font-size:16px; border-radius:8px; border:1px solid #ccc; }
    button { padding:15px 25px; font-size:18px; border:none; border-radius:10px; background:#42a5f5; color:white; cursor:pointer; margin-top:15px; }
    #link { margin-top:20px; word-break: break-all; }
    .logout { background:#ef5350; margin-top:20px; }
  </style>
</head>

<body>
  <div id="app">Betöltés...</div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://eogrnzuarpqlyjclkcqq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ3JuenVhcnBxbHlqY2xrY3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzQyOTYsImV4cCI6MjA4OTUxMDI5Nn0.VA2nMHVZJRHFntfCrsoxNOLJYvDp_a5-zIR4qdWUp8U"
    );

    const app = document.getElementById("app");

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();

      // 🔐 LOGIN
      if (!session) {
        app.innerHTML = `
          <div class="card">
            <h2>Bejelentkezés</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Jelszó">
            <button id="loginBtn">Belépés</button>
          </div>
        `;

        document.getElementById("loginBtn").onclick = async () => {
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          const { error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) alert("Hiba: " + error.message);
          else location.reload();
        };

        return;
      }

      // ✅ ADMIN UI
      app.innerHTML = `
        <div class="card">
          <h1>NFC Link Generátor</h1>

          <input id="name" placeholder="Név">
          <input id="g1_label" placeholder="Gondviselő 1">
          <input id="g1_phone" placeholder="Telefon">
          <input id="g2_label" placeholder="Gondviselő 2 (opcionális)">
          <input id="g2_phone" placeholder="Telefon">

          <button id="genBtn">Link generálása</button>

          <div id="link"></div>

          <button id="logoutBtn" class="logout">Kijelentkezés</button>
        </div>
      `;

      // 🔓 LOGOUT
      document.getElementById("logoutBtn").onclick = async () => {
        await supabase.auth.signOut();
        location.reload();
      };

      // 🔗 LINK GENERÁLÁS
      document.getElementById("genBtn").onclick = async () => {
        const { data: { session } } = await supabase.auth.getSession();

        const res = await fetch("https://eogrnzuarpqlyjclkcqq.supabase.co/functions/v1/create-tag", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${session.access_token}`
          },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            g1_label: document.getElementById("g1_label").value,
            g1_phone: document.getElementById("g1_phone").value,
            g2_label: document.getElementById("g2_label").value || null,
            g2_phone: document.getElementById("g2_phone").value || null
          })
        });

        const data = await res.json();
        console.log("FULL RESPONSE:", data);

        // ❗ HIBAKEZELÉS
        if (!res.ok) {
          alert("Hiba: " + data.error);
          return;
        }

        // ✅ SIKER
        document.getElementById("link").innerHTML = `
          <p><b>Generált link:</b></p>
          <input value="${data.url}" style="width:100%">
        `;
      };
    }

    init();
  </script>
</body>
</html>
