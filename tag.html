<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biléta</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Alex Brush betűtípus a Kattkaland gombra -->
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

  <style>
    body {
           margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), url('wood-texture.png');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #424b54;
    }

    h1 { font-size: 32px; margin-bottom: 10px; color: #222; }
    h2 { font-size: 28px; margin-bottom: 20px; color: #444; }

    /* Hívógombok */
    .btn {
      display: block;
      margin: 12px auto;
      padding: 16px;
      font-size: 20px;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      width: 70%;
      max-width: 300px;
      transition: 0.1s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn:active { transform: scale(0.97); }

    .call-g1 { background: rgba(66,165,245,0.9); } /* kék */
    .call-g2 { background: rgba(245,124,0,0.9); }  /* narancs */

    #note {
      margin-top: 15px;
      font-size: 16px;
      font-weight: bold;
    }

    /* Kattkaland gomb alul */
    .secondaryBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 30px auto 0;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #9b6a6c;
      color: white;
      cursor: pointer;
      font-family: 'Alex Brush', cursive;
      max-width: 250px;
      transition: 0.1s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }
    .secondaryBtn:active { transform: scale(0.97); }

    img.icon { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div id="app">Betöltés...</div>

  <script>
    // Supabase kliens átnevezve, hogy ne ütközzön
    const supabaseClient = supabase.createClient(
      "https://eogrnzuarpqlyjclkcqq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ3JuenVhcnBxbHlqY2xrY3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzQyOTYsImV4cCI6MjA4OTUxMDI5Nn0.VA2nMHVZJRHFntfCrsoxNOLJYvDp_a5-zIR4qdWUp8U" // ide az érvényes Anon Public Key
    );

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function load() {
      const { data, error } = await supabaseClient
        .from("tags")
        .select("*")
        .eq("id", id)
        .single();

      const appDiv = document.getElementById("app");

      if (error || !data) {
        appDiv.innerHTML = "<div>Nem található a biléta</div>";
        return;
      }

      let html = `
        <h1>Ez a biléta</h1>
        <h2>${data.name}</h2>

        <a class="btn call-g1" href="tel:${data.guardian1_phone}">📞 ${data.guardian1_label}</a>
      `;

      if (data.guardian2_phone) {
        html += `<a class="btn call-g2" href="tel:${data.guardian2_phone}">📞 ${data.guardian2_label}</a>`;
      }

      html += `<div id="note">Ha megtalált, kérjük hívja fel!</div>`;

      html += `
        <button class="secondaryBtn" onclick="window.location.href='https://example.com'">
          <img src="https://hegedustamas72.github.io/nfc-admin/brand-icon.png" alt="Brand" class="icon"> Kattkaland
        </button>
      `;

      appDiv.innerHTML = html;
    }

    load();
  </script>
</body>
</html>
