<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biléta</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Alex Brush betűtípus a Kattkaland gombra -->
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
      background: url('wood-texture.png') center/cover no-repeat;
      background-attachment: fixed;
      color: #333;
    }

    h1 { font-size: 32px; margin-bottom: 15px; color: #222; }
    h2 { font-size: 28px; margin-bottom: 20px; color: #444; }

    /* Hívógombok */
    .btn {
      display: block;
      margin: 15px auto;
      padding: 18px;
      font-size: 20px;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      width: 70%;
      max-width: 300px;
      transition: 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .call-g1 { background: #42a5f5; }
    .call-g2 { background: #f57c00; }

    #note {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
    }

    /* Másodlagos gomb alul */
    .secondaryBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 30px auto 0;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #9b6a6c;
      color: white;
      cursor: pointer;
      font-family: 'Alex Brush', cursive;
      max-width: 250px;
      transition: 0.1s;
    }
    .secondaryBtn:active { transform: scale(0.97); }

    img.icon { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div id="app">Betöltés...</div>

  <script type="module">
    const supabase = supabase.createClient(
      "https://eogrnzuarpqlyjclkcqq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ3JuenVhcnBxbHlqY2xrY3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzQyOTYsImV4cCI6MjA4OTUxMDI5Nn0.VA2nMHVZJRHFntfCrsoxNOLJYvDp_a5-zIR4qdWUp8U"
    );

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function load() {
      const { data, error } = await supabase
        .from("tags")
        .select("*")
        .eq("id", id)
        .single();

      if (error || !data) {
        document.getElementById("app").innerHTML = "Nem található a biléta";
        return;
      }

      let html = `
        <h1>Ez a biléta</h1>
        <h2>${data.name}</h2>

        <a class="btn call-g1" href="tel:${data.g1_phone}">📞 ${data.g1_label}</a>
      `;

      if (data.g2_phone) {
        html += `<a class="btn call-g2" href="tel:${data.g2_phone}">📞 ${data.g2_label}</a>`;
      }

      html += `<div id="note">Ha megtalált, kérjük hívja fel!</div>`;

      // Alul a landing oldalra mutató gomb
      html += `
        <button class="secondaryBtn" onclick="window.location.href='https://example.com'">
          <img src="brand-icon.png" alt="Brand" class="icon"> Kattkaland
        </button>
      `;

      document.getElementById("app").innerHTML = html;
    }

    load();
  </script>
</body>
</html>
