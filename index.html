<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kattkaland</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), url('wood-texture.png');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #424b54;
    }

    .container {
      text-align: center;
      max-width: 420px;
      width: 90%;
      padding: 40px 20px;
    }

    .logo {
      width: 160px;
      margin: 50px auto 20px auto;
      display: block;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.1));
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      color: white;
      transition: 0.25s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    .btn img {
      width: 22px;
      height: 22px;
    }

    .btn-main {
      background: linear-gradient(135deg, #9b6a6c, #e2b4bd);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #93a8ac, #424b54);
    }

    .btn-card {
      background: linear-gradient(135deg, #93a8ac, #9b6a6c);
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 22px rgba(0,0,0,0.12);
      opacity: 0.97;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .btn {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="logo.png" alt="Kattkaland logo" class="logo" />

    <a href="https://facebook.com/kattkaland" class="btn btn-main" target="_blank">
      <img src="facebook-icon.png" alt="Facebook" />
      Facebook
    </a>

    <a href="underconstruction.html" class="btn btn-secondary" target="_blank">
      <img src="brand-icon.png" alt="Web" />
      Weboldal
    </a>

    <a href="nevjegy.vcf" class="btn btn-card">
      <img src="contact-icon.jpg" alt="Kontakt" />
      Névjegy
    </a>
    
    <a href="napipozitiv.html" class="btn btn-secondary" target="_blank">
      <img src="pozitiv.png" alt="Napi" />
      Napi pozitív
      
    </a>
    <div class="footer">
      Kézzel készült ajándékok • Természetes • Egyedi
    </div>

  </div>
</body>
</html>
