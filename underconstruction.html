<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fejlesztés alatt</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;700&family=Alex+Brush&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;

      /* UGYANAZ a háttér mint a főoldalon */
      background: linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)), url('wood-texture.png');
      background-size: cover;
      background-position: center;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #424b54;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Alex Brush', cursive;
      font-size: 70px;
      margin-bottom: 20px;
      color: #424b54;
    }

    p {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #9b6a6c, #e2b4bd);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      transition: 0.25s ease;
    }

    a:hover {
      transform: translateY(-3px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Fejlesztés alatt</h1>
    <p>Ez az oldal még készül.</p>
    <a href="index.html">Vissza a főoldalra</a>
  </div>
</body>
</html>
